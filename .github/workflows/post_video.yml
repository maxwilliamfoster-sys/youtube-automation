name: Post YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  post-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache AI models (Whisper + Kokoro)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-v3

      - name: Cache Kokoro ONNX models
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-models-v1

      - name: Download Kokoro ONNX models
        if: steps.cache-kokoro.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p kokoro_models
          gh release download model-files-v1 --dir kokoro_models/

      - name: Cache gameplay clips
        uses: actions/cache@v4
        with:
          path: gameplay/
          key: gameplay-clips-v2

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --quiet groq edge-tts faster-whisper kokoro-onnx soundfile numpy \
            google-api-python-client google-auth-oauthlib \
            python-dotenv yt-dlp

      - name: Restore credentials
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: |
          python3 -c "import os; d=os.environ['YOUTUBE_CLIENT_SECRETS']; open('client_secrets.json','w',encoding='utf-8').write(d[1:] if d.startswith('﻿') else d)"
          python3 -c "import os; d=os.environ['YOUTUBE_TOKEN']; open('token.json','w',encoding='utf-8').write(d[1:] if d.startswith('﻿') else d)"
          echo "GROQ_API_KEY=${GROQ_API_KEY}" > .env
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" >> .env

      - name: Create required folders
        run: mkdir -p gameplay output audio

      - name: Run pipeline
        run: python main.py --count 1

      - name: Notify on success
        if: success()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          curl -s -X POST "https://ntfy.sh/${NTFY_TOPIC}" \
            -H "Title: YouTube Short Posted" \
            -H "Priority: default" \
            -H "Tags: youtube,clapper" \
            -d "A new horror story Short was just uploaded to your channel!"

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['pipeline-failure'],
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Pipeline failed - ${new Date().toLocaleDateString('en-GB')}`,
                body: `The YouTube Shorts automation failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nCheck the run logs to see what went wrong.`,
                labels: ['pipeline-failure']
              });
            }
