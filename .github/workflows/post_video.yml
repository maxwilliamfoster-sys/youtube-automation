name: Post YouTube Short

on:
  schedule:
    - cron: '0 9 * * *'
    - cron: '0 12 * * *'
    - cron: '30 15 * * *'
  workflow_dispatch:

jobs:
  post-video:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache AI models (Whisper + Kokoro)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-models-v3

      - name: Cache Kokoro ONNX models
        id: cache-kokoro
        uses: actions/cache@v4
        with:
          path: kokoro_models/
          key: kokoro-onnx-models-v2

      - name: Download Kokoro ONNX models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p kokoro_models
          [ -f kokoro_models/kokoro-v1.0.onnx ] || gh release download model-files-v1 --dir kokoro_models/

      - name: Cache gameplay clips
        uses: actions/cache@v4
        with:
          path: gameplay/
          key: gameplay-clips-v2

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          pip install --quiet groq edge-tts faster-whisper kokoro-onnx soundfile numpy \
            requests google-api-python-client google-auth-oauthlib \
            python-dotenv yt-dlp

      - name: Restore credentials
        env:
          YOUTUBE_CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
          YOUTUBE_TOKEN: ${{ secrets.YOUTUBE_TOKEN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 -c "import os; d=os.environ['YOUTUBE_CLIENT_SECRETS']; open('client_secrets.json','w',encoding='utf-8').write(d[1:] if d.startswith('﻿') else d)"
          python3 -c "import os; d=os.environ['YOUTUBE_TOKEN']; open('token.json','w',encoding='utf-8').write(d[1:] if d.startswith('﻿') else d)"
          echo "GROQ_API_KEY=${GROQ_API_KEY}" > .env
          echo "PEXELS_API_KEY=${PEXELS_API_KEY}" >> .env
          echo "OPENROUTER_API_KEY=${OPENROUTER_API_KEY}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}" >> .env
          echo "TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}" >> .env

      - name: Create required folders
        run: mkdir -p gameplay output audio

      - name: Run pipeline
        run: python main.py --count 1

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{\"chat_id\":\"${TELEGRAM_CHAT_ID}\",\"text\":\"❌ <b>Pipeline Failed</b>\\n\\nThe YouTube Shorts automation failed.\\n\\n<a href=\\\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">View run logs</a>\",\"parse_mode\":\"HTML\"}"
