name: BuriedCasefiles — Generate & Deliver

# Fully cloud video GENERATION. TikTok posting is done by you, by hand, from your
# phone — that's the most shadowban-proof method there is, and it means your PC
# never needs to be on. Each run builds the videos and sends them to your Telegram
# (with a ready-to-paste caption); they're also saved as downloadable artifacts.

on:
  schedule:
    # Times are UTC; UK is currently BST (UTC+1). Each run makes ONE video and sends
    # it to Telegram ~10-15 min after the cron fires (GitHub's free scheduler is not
    # minute-precise, so treat these as "around" 9am / 1pm / 4pm).
    - cron: '45 7 * * *'     # ~09:00 UK — video 1
    - cron: '45 11 * * *'    # ~13:00 UK — video 2
    - cron: '45 14 * * *'    # ~16:00 UK — video 3
  workflow_dispatch:          # "Run workflow" button — generate on demand
    inputs:
      count:
        description: 'How many videos to generate'
        default: '1'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write   # to commit recent_cases.json back so cases never repeat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Caches (first run is slow; later runs reuse models/assets) ─────────────
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Cache models, font & music
        uses: actions/cache@v4
        with:
          path: |
            kokoro_models/
            assets/
            music/
            ~/.cache/huggingface
          key: assets-v3

      # ── System deps: only FFmpeg + audio libs. No browser, no Xvfb. ───────────
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg espeak-ng libsndfile1 libgomp1

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Download font + music assets
        run: python setup_music.py

      # ── Secrets → .env (generation keys + Telegram delivery) ──────────────────
      - name: Write .env
        env:
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          CEREBRAS_API_KEY:   ${{ secrets.CEREBRAS_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          {
            echo "GROQ_API_KEY=$GROQ_API_KEY"
            echo "PEXELS_API_KEY=$PEXELS_API_KEY"
            echo "OPENROUTER_API_KEY=$OPENROUTER_API_KEY"
            echo "CEREBRAS_API_KEY=$CEREBRAS_API_KEY"
            echo "TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN"
            echo "TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID"
          } > .env

      # ── Generate videos and deliver them to Telegram ──────────────────────────
      - name: Generate & deliver
        run: python main_documentary.py --cloud --count ${{ github.event.inputs.count || '1' }}
        env:
          PYTHONUNBUFFERED: "1"

      # ── Persist used cases so future runs never repeat a case ─────────────────
      # case_pool.json rides along: rebuilding it costs ~60 rate-limited Wikipedia
      # calls, so it is committed and only refetched when it expires.
      - name: Persist recent cases
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recent_cases.json case_pool.json || true
          if git diff --staged --quiet; then
            echo "No new case to persist."
          else
            git commit -m "chore: update recent cases [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      # ── Backup copy: downloadable from the run page for 2 days ─────────────────
      # Telegram is the real delivery path; this is only a fallback. It is allowed to
      # fail: the free artifact storage quota fills up, and when it did every run went
      # red even though the video had already been delivered successfully.
      # Retention is short so the quota cannot fill again.
      - name: Upload videos as artifacts
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: videos-${{ github.run_id }}
          path: output/*.mp4
          if-no-files-found: ignore
          retention-days: 2
